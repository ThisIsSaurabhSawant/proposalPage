<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

/* CENTER BOX */
.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 10;
    transition: 0.4s;
}

.blur {
    filter: blur(8px);
    transform: scale(0.95);
}

/* BUTTONS PERFECT ALIGN */
.buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

button {
    padding: 10px 22px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
}

#yesBtn {
    background: #28a745;
    color: white;
}

#noBtn {
    background: #dc3545;
    color: white;
    position: relative;
}

/* POPUP */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(255,182,193,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    animation: pop 0.3s ease;
}

@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>
</head>

<body>

<div class="container" id="mainBox">
    <h1 id="title"></h1>
    <p id="line1"></p>
    <p id="line2"></p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup">
        <h2 id="finalText"></h2>
        <p>I choose you today and every day after this...❤️</p>
    </div>
</div>

<canvas id="canvas"></canvas>

<audio id="bgMusic" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<script>
// TYPEWRITER
function typeWriter(el, text, speed=40){
    let i=0;
    function t(){
        if(i<text.length){
            el.innerHTML+=text[i++];
            setTimeout(t,speed);
        }
    }
    t();
}

typeWriter(title,"Hey Sonali...❤️");
setTimeout(()=>typeWriter(line1,"I want to grow old with you..."),800);
setTimeout(()=>typeWriter(line2,"Will you be mine? 💖"),2000);

// 😈 PLAYFUL NO BUTTON
let level=0;
const noBtn=document.getElementById("noBtn");

noBtn.onmouseover=()=>{
    level++;

    if(level===2) noBtn.innerText="Are you sure? 🤔";
    if(level===3) noBtn.innerText="Think again 😏";
    if(level===4) noBtn.innerText="Last chance 😜";
    if(level>=5) noBtn.style.transform="scale(0.6)";

    const maxX=window.innerWidth-noBtn.offsetWidth;
    const maxY=window.innerHeight-noBtn.offsetHeight;

    noBtn.style.position="fixed";
    noBtn.style.left=Math.random()*maxX+"px";
    noBtn.style.top=Math.random()*maxY+"px";
};

// 💖 CANVAS + GYRO
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let control={x:0,y:0};

// GYRO
if(window.DeviceOrientationEvent){
    window.addEventListener("deviceorientation",(e)=>{
        control.x=e.gamma/20;
        control.y=e.beta/20;
    });
}

// MOUSE fallback
window.addEventListener("mousemove",(e)=>{
    control.x=(e.clientX-canvas.width/2)/100;
    control.y=(e.clientY-canvas.height/2)/100;
});

// HEARTS
let hearts=[];
for(let i=0;i<100;i++){
    hearts.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        dx:(Math.random()-0.5)*2,
        dy:(Math.random()-0.5)*2,
        size:Math.random()*20+10
    });
}

function drawHearts(){
    hearts.forEach(h=>{
        ctx.font=h.size+"px Arial";
        ctx.fillText("❤️",h.x,h.y);

        h.x+=h.dx+control.x;
        h.y+=h.dy+control.y;

        const p=h.size;

        if(h.x<p||h.x>canvas.width-p) h.dx*=-1;
        if(h.y<p||h.y>canvas.height-p) h.dy*=-1;
    });
}

// 🎉 PARTICLES
let particles=[];
function explode(){
    for(let i=0;i<150;i++){
        particles.push({
            x:canvas.width/2,
            y:canvas.height/2,
            dx:(Math.random()-0.5)*10,
            dy:(Math.random()-0.5)*10,
            life:100
        });
    }
}

function drawParticles(){
    particles.forEach((p,i)=>{
        ctx.fillText("💖",p.x,p.y);
        p.x+=p.dx;
        p.y+=p.dy;
        p.life--;
        if(p.life<=0) particles.splice(i,1);
    });
}

// 💖 YES CLICK
yesBtn.onclick=()=>{
    explode();

    // vibration
    if(navigator.vibrate) navigator.vibrate([200,100,200]);

    // music
    const music=document.getElementById("bgMusic");
    music.volume=0.3;
    music.play().catch(()=>{});

    // blur + popup
    document.getElementById("mainBox").classList.add("blur");
    const overlay=document.getElementById("overlay");
    overlay.style.display="flex";

    // name reveal
    typeWriter(document.getElementById("finalText"),"Saurabh ❤️ Sonali",80);

    // auto close
    setTimeout(()=>{
        overlay.style.display="none";
        document.getElementById("mainBox").classList.remove("blur");
    },3000);
};

// ANIMATION
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawHearts();
    drawParticles();
    requestAnimationFrame(animate);
}
animate();

// RESIZE
onresize=()=>{
    canvas.width=innerWidth;
    canvas.height=innerHeight;
};
</script>

</body>
</html>
