<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Just One Question ❤️</title>
<style>
:root {
    --primary-pink: #ff4d6d;
    --soft-pink: #ffccd5;
    --deep-rose: #c9184a;
}
body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #fff0f3 0%, #ffccd5 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    touch-action: none;
}

.container {
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(12px);
    padding: 40px;
    border-radius: 30px;
    text-align: center;
    width: 320px;
    box-shadow: 0 20px 60px rgba(255, 77, 109, 0.25);
    z-index: 10;
    border: 2px solid #ffffff;
    transition: all 0.3s ease;
}

h1 { color: var(--primary-pink); margin: 0 0 10px 0; font-size: 26px; }
p { color: #594d5b; line-height: 1.5; margin-bottom: 5px; }

#missCount {
    font-size: 12px;
    color: #a38088;
    margin-bottom: 20px;
    font-weight: bold;
}

.buttons {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
}

button {
    padding: 14px 30px;
    border: none;
    border-radius: 18px;
    cursor: pointer;
    font-size: 18px;
    font-weight: 700;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
}

#yesBtn {
    background: var(--primary-pink);
    color: white;
    box-shadow: 0 8px 20px rgba(255, 77, 109, 0.4);
}
#yesBtn:active { transform: scale(0.9); }

#noBtn {
    background: #fff;
    color: var(--primary-pink);
    border: 2px solid var(--soft-pink);
    z-index: 100;
    white-space: nowrap;
}

/* Shake animation for the container when No button moves */
.shake { animation: shake 0.4s ease-in-out; }
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
}

#overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(6px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup {
    background: white;
    padding: 50px;
    border-radius: 40px;
    text-align: center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.1);
    border: 4px solid var(--primary-pink);
    animation: pop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container" id="mainBox">
    <h1 id="typingText"></h1>
    <p>I want to grow old with you, laugh with you, and love you endlessly.</p>
    <p>Will you be mine? 💖</p>
    <div id="missCount">Attempts to escape: 0</div>
    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup">
        <h2 style="color: var(--primary-pink); font-size: 2.8rem; margin: 0;">💖 Saurabh ❤️ Sonali 💖</h2>
        <p>I choose you today and every day after this...❤️</p>
    </div>
</div>

<script>
/* ------------------ TYPING EFFECT ------------------ */
const typingText = "Hey Sonali... ❤️";
const typingEl = document.getElementById("typingText");
let idx = 0;
function typeWriter(){
    if(idx < typingText.length){
        typingEl.innerHTML += typingText[idx];
        idx++;
        setTimeout(typeWriter, 150);
    }
}
typeWriter();

/* ------------------ HEARTS ------------------ */
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let hearts = [];
let mouse = { x: -1000, y: -1000 };
const MAX_HEARTS = 60;

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

class Heart {
    constructor(){
        this.reset();
    }
    reset(){
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 25 + 10;
        this.speedX = (Math.random() - 0.5) * 1.5;
        this.speedY = (Math.random() - 0.5) * 1.5;
        this.opacity = Math.random() * 0.4 + 0.2;
    }
    update(){
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 250){
            this.x += dx*0.015;
            this.y += dy*0.015;
        }
        this.x += this.speedX;
        this.y += this.speedY;

        if(this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if(this.y < 0 || this.y > canvas.height) this.speedY *= -1;
    }
    draw(){
        ctx.globalAlpha = this.opacity;
        ctx.font = `${this.size}px Arial`;
        ctx.fillText("❤️", this.x, this.y);
    }
}

for(let i=0;i<MAX_HEARTS;i++) hearts.push(new Heart());

const isMobile = /Mobi|Android/i.test(navigator.userAgent);
if(!isMobile){
    window.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
} else if(window.DeviceOrientationEvent){
    window.addEventListener('deviceorientation', e=>{
        mouse.x = canvas.width/2 + (e.gamma||0)*12;
        mouse.y = canvas.height/2 + (e.beta||0)*12;
        mouse.x = Math.max(0, Math.min(canvas.width, mouse.x));
        mouse.y = Math.max(0, Math.min(canvas.height, mouse.y));
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    hearts.forEach(h=>{ h.update(); h.draw(); });
    requestAnimationFrame(animate);
}
animate();

/* ------------------ NO BUTTON PLAYFUL ------------------ */
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const mainBox = document.getElementById("mainBox");
const missCount = document.getElementById("missCount");
let misses = 0;

const moveNo = () => {
    misses++;
    missCount.innerText = `Attempts to escape: ${misses}`;
    const margin = 20;
    const maxX = window.innerWidth - noBtn.offsetWidth - margin;
    const maxY = window.innerHeight - noBtn.offsetHeight - margin;

    const randomX = Math.random() * maxX + margin;
    const randomY = Math.random() * maxY + margin;

    noBtn.style.position = "fixed";
    noBtn.style.left = `${randomX}px`;
    noBtn.style.top = `${randomY}px`;

    // Shake main box
    mainBox.classList.remove("shake");
    void mainBox.offsetWidth;
    mainBox.classList.add("shake");

    // Optional playful rotation
    noBtn.style.transform = `rotate(${Math.random()*20-10}deg)`;
}

noBtn.addEventListener("mouseenter", moveNo);
noBtn.addEventListener("touchstart", moveNo);

/* ------------------ YES BUTTON ------------------ */
yesBtn.onclick = () => {
    document.getElementById("overlay").style.display = "flex";
    setTimeout(()=>{ document.getElementById("overlay").style.display = "none"; }, 3000);
};
</script>
</body>
</html>
