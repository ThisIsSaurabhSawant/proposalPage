<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

.container {
    text-align: center;
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 300px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    position: relative;
}

.buttons {
    display: flex;
    justify-content: center;
    gap: 15px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

#yesBtn {
    background: #28a745;
    color: white;
}

#noBtn {
    background: #dc3545;
    color: white;
    position: absolute;
}

#message {
    display: none;
    margin-top: 20px;
    color: #ff4d6d;
}

/* popup */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(255,182,193,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup {
    background: white;
    padding: 30px;
    border-radius: 20px;
    animation: pop 0.4s ease;
}

@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* blast */
.blast {
    position: fixed;
    pointer-events: none;
    animation: flyUp linear forwards;
}

@keyframes flyUp {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Hey Sonali...❤️</h1>
    <p>Will you be mine? 💖</p>

    <div class="buttons">
        <button id="yesBtn">Yes 😍</button>
        <button id="noBtn">No 😅</button>
    </div>

    <div id="message">You made me happiest ❤️</div>
</div>

<div id="overlay">
    <div class="popup">
        <h2>💖 Yayyyy! 💖</h2>
        <p>You just made my world brighter ✨</p>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const container = document.querySelector(".container");
    const overlay = document.getElementById("overlay");

    let clicks = 0;

    // keep NO button inside box
    function moveInsideBox() {
        const rect = container.getBoundingClientRect();

        const maxX = rect.width - noBtn.offsetWidth;
        const maxY = rect.height - noBtn.offsetHeight;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    noBtn.addEventListener("click", () => {
        clicks++;
        if (clicks > 2) moveInsideBox();
    });

    noBtn.addEventListener("mouseover", () => {
        if (clicks > 1) moveInsideBox();
    });

    // YES CLICK
    yesBtn.addEventListener("click", () => {

        overlay.style.display = "flex";

        // 💥 MASSIVE BLAST (fills screen)
        const hearts = ["❤️","💖","💘","💕","💞"];

        for (let i = 0; i < 400; i++) {
            let el = document.createElement("div");
            el.className = "blast";
            el.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

            el.style.left = Math.random() * 100 + "vw";
            el.style.fontSize = (Math.random() * 25 + 15) + "px";
            el.style.animationDuration = (Math.random() * 2 + 2) + "s";

            document.body.appendChild(el);

            setTimeout(() => el.remove(), 3000);
        }

        // ⏳ 3 sec popup
        setTimeout(() => {
            overlay.style.display = "none";
            startChaosHearts();
        }, 3000);
    });

    // 💥 CHAOS HEARTS (bouncing everywhere)
    function startChaosHearts() {
        const hearts = ["❤️","💖","💘","💕","💞"];

        for (let i = 0; i < 40; i++) {
            let el = document.createElement("div");
            el.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

            el.style.position = "fixed";
            el.style.fontSize = "24px";

            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;

            el.style.left = x + "px";
            el.style.top = y + "px";

            document.body.appendChild(el);

            let dx = (Math.random() - 0.5) * 10;
            let dy = (Math.random() - 0.5) * 10;

            function move() {
                x += dx;
                y += dy;

                if (x <= 0 || x >= window.innerWidth - 20) dx *= -1;
                if (y <= 0 || y >= window.innerHeight - 20) dy *= -1;

                el.style.left = x + "px";
                el.style.top = y + "px";

                requestAnimationFrame(move);
            }

            move();
        }
    }

});
</script>

</body>
</html>
