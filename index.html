<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    position: relative;
}

.buttons {
    position: relative;
    height: 70px;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    position: absolute;
}

#yesBtn {
    background: #28a745;
    color: white;
    left: 20px;
}

#noBtn {
    background: #dc3545;
    color: white;
    right: 20px;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(255,182,193,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup {
    background: white;
    padding: 30px;
    border-radius: 20px;
    animation: pop 0.3s ease;
}

@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

.heart {
    position: fixed;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="container">
    <h1>Hey Sonali.❤️</h1>
    <p>Will you be mine? 💖</p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup">
        <h2>💖 Yayyyy! 💖</h2>
        <p>You made my world ❤️</p>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const overlay = document.getElementById("overlay");

    // ✅ NO button moves instantly on hover
    noBtn.addEventListener("mouseenter", () => {
        const container = document.querySelector(".buttons");
        const rect = container.getBoundingClientRect();

        const maxX = rect.width - noBtn.offsetWidth;
        const maxY = rect.height - noBtn.offsetHeight;

        let x = Math.random() * maxX;
        let y = Math.random() * maxY;

        // avoid yes button zone
        if (x < 120) x += 80;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    // ✅ YES click
    yesBtn.addEventListener("click", () => {

        // show popup instantly
        overlay.style.display = "flex";

        // 💥 BIG BLAST
        const hearts = ["❤️","💖","💘","💕","💞","❤️","💖","💘","💕","💞","❤️","💖","💘","💕","💞","❤️","💖","💘","💕","💞","❤️","💖","💘","💕","💞"];

        for (let i = 0; i < 1200; i++) {
            let el = document.createElement("div");
            el.className = "heart";
            el.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

            let x = Math.random() * window.innerWidth;
            let y = window.innerHeight;

            el.style.left = x + "px";
            el.style.top = y + "px";
            el.style.fontSize = (Math.random() * 25 + 10) + "px";

            document.body.appendChild(el);

            let speed = Math.random() * 8 + 4;

            function fly() {
                y -= speed;
                el.style.top = y + "px";

                if (y > -50) {
                    requestAnimationFrame(fly);
                } else {
                    el.remove();
                }
            }

            fly();
        }

        // ⏳ 3 sec popup
        setTimeout(() => {
            overlay.style.display = "none";
            startChaos();
        }, 3000);
    });

    // 💥 CHAOS HEARTS
    function startChaos() {
        const hearts = ["❤️","💖","💘","💕","💞","❤️","💖","💘","💕","💞","❤️","💖","💘","💕","💞","❤️","💖","💘","💕","💞","❤️","💖","💘","💕","💞"];

        for (let i = 0; i < 120; i++) {
            let el = document.createElement("div");
            el.className = "heart";
            el.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;

            el.style.left = x + "px";
            el.style.top = y + "px";
            el.style.fontSize = "20px";

            document.body.appendChild(el);

            let dx = (Math.random() - 0.5) * 15;
            let dy = (Math.random() - 0.5) * 15;

            function move() {
                x += dx;
                y += dy;

                // bounce edges
                if (x <= 0 || x >= window.innerWidth - 20) dx *= -1;
                if (y <= 0 || y >= window.innerHeight - 20) dy *= -1;

                el.style.left = x + "px";
                el.style.top = y + "px";

                requestAnimationFrame(move);
            }

            move();
        }
    }

});
</script>

</body>
</html>
