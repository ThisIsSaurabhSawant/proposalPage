<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just One Question ❤️</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; 
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 320px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 { color: #d63384; margin-bottom: 10px; }
        p { color: #444; margin-bottom: 20px; }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            position: relative;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s ease;
        }

        #yesBtn {
            background: #ff4757;
            color: white;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }

        #noBtn {
            background: #f1f2f6;
            color: #57606f;
            z-index: 15;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">
    <h1>Hey Sonali...❤️</h1>
    <p>I want to grow old with you, laugh with you, and love you endlessly.</p>
    <p><b>Will you be mine? 💖</b></p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup">
        <h2 style="color: #ff4757; font-size: 2rem;">Saurabh ❤️ Sonali</h2>
        <p>I choose you today and every day after this...❤️</p>
    </div>
</div>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let hearts = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    class Heart {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + 20;
            // Only hearts of different sizes
            this.size = Math.random() * 25 + 10; 
            this.speed = Math.random() * 1 + 0.5;
            this.opacity = Math.random() * 0.5 + 0.3;
        }
        update() {
            this.y -= this.speed;
            if (this.y < -30) this.reset();
        }
        draw() {
            ctx.globalAlpha = this.opacity;
            ctx.font = `${this.size}px Arial`;
            ctx.fillText("❤️", this.x, this.y);
        }
    }

    for (let i = 0; i < 40; i++) hearts.push(new Heart());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        hearts.forEach(h => { h.update(); h.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    let yesScale = 1;

    const moveNo = () => {
        // Calculate safe boundaries so the button stays fully on screen
        const padding = 20;
        const maxX = window.innerWidth - noBtn.offsetWidth - padding;
        const maxY = window.innerHeight - noBtn.offsetHeight - padding;
        
        // Ensure values aren't negative if screen is tiny
        const randomX = Math.max(padding, Math.random() * maxX);
        const randomY = Math.max(padding, Math.random() * maxY);
        
        noBtn.style.position = "fixed";
        noBtn.style.left = `${randomX}px`;
        noBtn.style.top = `${randomY}px`;

        // Every time she misses, make 'Yes' bigger and harder to ignore
        yesScale += 0.15;
        yesBtn.style.transform = `scale(${yesScale})`;
    };

    noBtn.addEventListener("mouseover", moveNo);
    noBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        moveNo();
    });

    yesBtn.onclick = () => {
        document.getElementById("overlay").style.display = "flex";
    };
</script>

</body>
</html>
