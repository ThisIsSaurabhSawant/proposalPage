<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 10;
    transition: 0.5s;
}

.blur {
    filter: blur(8px);
    transform: scale(0.95);
}

.buttons {
    position: relative;
    height: 80px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    position: absolute;
}

#yesBtn {
    background: #28a745;
    color: white;
    left: 20px;
    top: 20px;
}

#noBtn {
    background: #dc3545;
    color: white;
    left: 180px;
    top: 20px;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}

/* 💖 POPUP */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(255,182,193,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    animation: pop 0.4s ease;
}

@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="container" id="mainBox">
    <h1 id="title"></h1>
    <p id="line1"></p>
    <p id="line2"></p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<!-- 💖 POPUP -->
<div id="overlay">
    <div class="popup">
        <h2>💖 Wow! 💖</h2>
        <p>I choose you today and every day after this...❤️</p>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
// ✍️ TYPEWRITER
function typeWriter(el, text, speed=40){
    let i=0;
    function t(){
        if(i<text.length){
            el.innerHTML+=text[i++];
            setTimeout(t,speed);
        }
    }
    t();
}

typeWriter(title,"Hey Sonali...❤️");
setTimeout(()=>typeWriter(line1,"I want to grow old with you..."),800);
setTimeout(()=>typeWriter(line2,"Will you be mine? 💖"),2000);

// 😈 SMART NO BUTTON
let level=0;
noBtn.onmouseover=()=>{
    level++;
    noBtn.style.position="fixed";

    if(level===3) noBtn.style.transform="scale(0.7)";
    if(level===4) noBtn.innerText="Are you sure? 😏";
    if(level>=5) noBtn.style.display="none";

    noBtn.style.left=Math.random()*(innerWidth-100)+"px";
    noBtn.style.top=Math.random()*(innerHeight-50)+"px";
};

// 💖 CANVAS
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

// 💖 HEARTS
let hearts=[];
for(let i=0;i<100;i++){
    hearts.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        dx:(Math.random()-0.5)*2,
        dy:(Math.random()-0.5)*2,
        size:Math.random()*20+10
    });
}

function drawHearts(){
    hearts.forEach(h=>{
        ctx.font=h.size+"px Arial";
        ctx.fillText("❤️",h.x,h.y);

        h.x+=h.dx;
        h.y+=h.dy;

        if(h.x<0||h.x>canvas.width)h.dx*=-1;
        if(h.y<0||h.y>canvas.height)h.dy*=-1;
    });
}

// 🎉 PARTICLES
let particles=[];
function explode(){
    for(let i=0;i<150;i++){
        particles.push({
            x:canvas.width/2,
            y:canvas.height/2,
            dx:(Math.random()-0.5)*10,
            dy:(Math.random()-0.5)*10,
            life:100
        });
    }
}

function drawParticles(){
    particles.forEach((p,i)=>{
        ctx.fillText("💖",p.x,p.y);
        p.x+=p.dx;
        p.y+=p.dy;
        p.life--;
        if(p.life<=0)particles.splice(i,1);
    });
}

// 💖 YES CLICK
yesBtn.onclick=()=>{
    explode();

    // vibration
    if(navigator.vibrate) navigator.vibrate([200,100,200]);

    // blur background
    document.getElementById("mainBox").classList.add("blur");

    // show popup
    document.getElementById("overlay").style.display="flex";
};

// 🎬 ANIMATION
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawHearts();
    drawParticles();
    requestAnimationFrame(animate);
}
animate();

// 📱 RESIZE
onresize=()=>{
    canvas.width=innerWidth;
    canvas.height=innerHeight;
};
</script>

</body>
</html>
