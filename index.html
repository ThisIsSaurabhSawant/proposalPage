<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 10;
}

.buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
}

#yesBtn {
    background: #28a745;
    color: white;
}

#noBtn {
    background: #dc3545;
    color: white;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(255,182,193,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup {
    background: white;
    padding: 30px;
    border-radius: 20px;
    animation: pop 0.3s ease;
    text-align: center;
}

@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>
</head>

<body>

<div class="container">
    <h1>Hey Sonali...❤️</h1>
    <p>I want to grow old with you, laugh with you, and love you endlessly.</p>
    <p>Will you be mine? 💖</p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup">
        <h2>💖 Saurabh ❤️ Sonali 💖</h2>
        <p>I choose you today and every day after this...❤️</p>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];
const MAX_HEARTS = 120; // limit hearts to prevent lag
let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

// Heart class
class Heart {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 20 + 10;
        this.dx = (Math.random() - 0.5) * 1.5;
        this.dy = (Math.random() - 0.5) * 1.5;
    }

    draw() {
        ctx.font = this.size + "px Arial";
        ctx.fillText("❤️", this.x, this.y);
    }

    update() {
        // Attraction to mouse/gyro
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;

        this.x += dx * 0.002 + this.dx;
        this.y += dy * 0.002 + this.dy;

        // Keep hearts inside screen
        if (this.x <= 0) { this.x = 0; this.dx *= -1; }
        if (this.x >= canvas.width) { this.x = canvas.width; this.dx *= -1; }
        if (this.y <= 0) { this.y = 0; this.dy *= -1; }
        if (this.y >= canvas.height) { this.y = canvas.height; this.dy *= -1; }
    }
}

// Create initial hearts
for (let i = 0; i < MAX_HEARTS; i++) hearts.push(new Heart());

// Detect device type for gyro
let isMobile = /Mobi|Android/i.test(navigator.userAgent);

// Mouse move for desktop
if(!isMobile){
    window.addEventListener("mousemove", (e)=>{
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
}

// Gyroscope for mobile
if(isMobile && window.DeviceOrientationEvent){
    window.addEventListener('deviceorientation', function(event){
        let gamma = event.gamma || 0; // left-right tilt
        let beta = event.beta || 0;   // front-back tilt

        // Map tilt to canvas coordinates
        mouse.x = canvas.width/2 + gamma * 8; // sensitivity adjust
        mouse.y = canvas.height/2 + beta * 8;

        // clamp to screen
        mouse.x = Math.max(0, Math.min(canvas.width, mouse.x));
        mouse.y = Math.max(0, Math.min(canvas.height, mouse.y));
    }, true);
}

// Animation loop
function animate(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    hearts.forEach(h => { h.update(); h.draw(); });
    requestAnimationFrame(animate);
}
animate();

// NO button playful
const noBtn = document.getElementById("noBtn");
noBtn.onmouseover = function(){
    const maxX = window.innerWidth - this.offsetWidth;
    const maxY = window.innerHeight - this.offsetHeight;
    this.style.position = "fixed";
    this.style.left = Math.random() * maxX + "px";
    this.style.top = Math.random() * maxY + "px";
};

// YES button click with heart burst and popup
const yesBtn = document.getElementById("yesBtn");
yesBtn.onclick = () => {
    const overlay = document.getElementById("overlay");
    overlay.style.display = "flex";

    setTimeout(() => { overlay.style.display = "none"; }, 3000);

    // Heart burst effect
    hearts.forEach(h => {
        h.dx += (Math.random() - 0.5) * 2;
        h.dy += (Math.random() - 0.5) * 2;
        h.size += 2; // small pop effect
    });
};

// Handle resize
window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

</script>

</body>
</html>
