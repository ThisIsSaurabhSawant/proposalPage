<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
    transition: transform 0.4s ease;
}

.container {
    text-align: center;
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 { color: #ff4d6d; }

button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin: 10px;
    transition: 0.3s;
}

#yesBtn {
    background: #28a745;
    color: white;
}

#noBtn {
    background: #dc3545;
    color: white;
    position: fixed;
}

#message {
    display: none;
    margin-top: 20px;
    color: #ff4d6d;
    font-size: 18px;
}

/* HEART BLAST */
.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.floating {
    position: absolute;
    animation: floatUp linear forwards;
}

@keyframes floatUp {
    from {
        transform: translateY(100vh);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}

/* POPUP */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(255,182,193,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup {
    background: white;
    padding: 35px;
    border-radius: 20px;
    text-align: center;
    animation: zoomIn 0.4s ease;
}

@keyframes zoomIn {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Hey ❤️</h1>
    <p>Will you be mine? 💖</p>

    <button id="yesBtn">Yes 😍</button>
    <button id="noBtn">No 😅</button>

    <div id="message">You made me the happiest ❤️</div>
</div>

<div class="hearts" id="hearts"></div>

<div id="overlay">
    <div class="popup">
        <h2>💖 Yayyyy! 💖</h2>
        <p>You just made my world brighter ✨</p>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const overlay = document.getElementById("overlay");
    const heartsContainer = document.getElementById("hearts");
    const message = document.getElementById("message");

    let noClicks = 0;

    // NO BUTTON LOGIC
    noBtn.addEventListener("click", () => {
        noClicks++;

        if (noClicks <= 4) {
            noBtn.style.transform = `scale(${1 + noClicks * 0.3})`;
        } else {
            moveButton();
        }
    });

    noBtn.addEventListener("mouseover", () => {
        if (noClicks >= 4) moveButton();
    });

    function moveButton() {
        const maxX = window.innerWidth - noBtn.offsetWidth - 20;
        const maxY = window.innerHeight - noBtn.offsetHeight - 20;

        noBtn.style.left = Math.random() * maxX + "px";
        noBtn.style.top = Math.random() * maxY + "px";
    }

    // YES BUTTON
    yesBtn.addEventListener("click", () => {

        message.style.display = "block";
        overlay.style.display = "flex";
        document.body.style.transform = "scale(1.05)";

        // 💥 HEART BLAST
        const hearts = ["❤️","💖","💘","💕","💞"];

        for (let i = 0; i < 80; i++) {
            let el = document.createElement("div");
            el.className = "floating";
            el.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

            el.style.left = Math.random() * 100 + "vw";
            el.style.fontSize = (Math.random() * 20 + 15) + "px";
            el.style.animationDuration = (Math.random() * 2 + 2) + "s";

            heartsContainer.appendChild(el);

            setTimeout(() => el.remove(), 3500);
        }

        // ⏳ CLOSE POPUP AFTER 5 SEC
        setTimeout(() => {
            overlay.style.display = "none";
            startBouncingHearts();
        }, 5000);
    });

    // 🎉 BOUNCING HEARTS
    function startBouncingHearts() {
        const hearts = ["❤️","💖","💘","💕","💞"];

        for (let i = 0; i < 20; i++) {
            let el = document.createElement("div");
            el.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

            el.style.position = "fixed";
            el.style.fontSize = "24px";
            el.style.left = Math.random() * (window.innerWidth - 30) + "px";
            el.style.top = Math.random() * (window.innerHeight - 30) + "px";

            document.body.appendChild(el);

            let dx = (Math.random() - 0.5) * 6;
            let dy = (Math.random() - 0.5) * 6;

            function animate() {
                let rect = el.getBoundingClientRect();

                let x = rect.left + dx;
                let y = rect.top + dy;

                if (x <= 0 || x >= window.innerWidth - 30) dx *= -1;
                if (y <= 0 || y >= window.innerHeight - 30) dy *= -1;

                el.style.left = x + "px";
                el.style.top = y + "px";

                requestAnimationFrame(animate);
            }

            animate();
        }
    }

});
</script>

</body>
</html>
