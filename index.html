<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>
<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
}

#contentWrapper {
    position: relative;
    width: 100%;
    height: 100%;
    transition: filter 0.3s ease;
}

#contentWrapper.blur {
    filter: blur(8px);
}

.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.buttons {
    margin-top: 20px;
    display: flex;
    justify-content: space-between; /* keep buttons on sides */
    position: relative;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s ease;
}

#yesBtn {
    background: #28a745;
    color: white;
    z-index: 5;
    position: relative;
}

#noBtn {
    background: #dc3545;
    color: white;
    position: relative;
    z-index: 5;
}

#overlay {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1001;
    pointer-events: none;
}

.popup {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.3s ease;
    pointer-events: auto;
}

.popup.show {
    opacity: 1;
    transform: scale(1);
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>
</head>
<body>

<div id="contentWrapper">
    <canvas id="bgCanvas"></canvas>

    <div class="container" id="mainContainer">
        <h1 id="typeText"></h1>
        <p id="typeSubText1"></p>
        <p id="typeSubText2"></p>

        <div class="buttons">
            <button id="yesBtn">Yes ❤️</button>
            <button id="noBtn">No 😅</button>
        </div>
    </div>
</div>

<div id="overlay">
    <div class="popup" id="popup">
        <h2>💖 Saurabh ❤️ Sonali 💖</h2>
        <p>I choose you today and every day after this...❤️</p>
    </div>
</div>

<script>
// ==================== TYPEWRITER ====================
const messages = [
    "Hey Sonali...❤️",
    "I want to grow old with you, laugh with you, and love you endlessly.",
    "Will you be mine? 💖"
];

const typeText = document.getElementById("typeText");
const typeSubText1 = document.getElementById("typeSubText1");
const typeSubText2 = document.getElementById("typeSubText2");

function typeWriter(text, element, delay=50) {
    return new Promise(resolve=>{
        let i = 0;
        function type() {
            if(i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, delay);
            } else resolve();
        }
        type();
    });
}

async function runTyping() {
    await typeWriter(messages[0], typeText);
    await typeWriter(messages[1], typeSubText1);
    await typeWriter(messages[2], typeSubText2);
}
runTyping();

// ==================== HEART BACKGROUND ====================
const bgCanvas = document.getElementById("bgCanvas");
const bgCtx = bgCanvas.getContext("2d");
bgCanvas.width = window.innerWidth;
bgCanvas.height = window.innerHeight;

let mouse = {x: bgCanvas.width/2, y: bgCanvas.height/2};
let isMobile = /Mobi|Android/i.test(navigator.userAgent);

class Heart {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * bgCanvas.width;
        this.y = Math.random() * bgCanvas.height;
        this.size = Math.random() * 20 + 10;
        this.dx = (Math.random()-0.5) * 0.8;
        this.dy = (Math.random()-0.5) * 0.8;
    }
    update() {
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        this.x += dx * 0.002 + this.dx;
        this.y += dy * 0.002 + this.dy;

        // keep inside screen
        if(this.x < 0) this.x = 0;
        if(this.x > bgCanvas.width) this.x = bgCanvas.width;
        if(this.y < 0) this.y = 0;
        if(this.y > bgCanvas.height) this.y = bgCanvas.height;
    }
    draw() {
        bgCtx.font = this.size + "px Arial";
        bgCtx.fillText("❤️", this.x, this.y);
    }
}

let hearts = [];
for(let i=0;i<80;i++) hearts.push(new Heart());

function animateBG() {
    bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
    hearts.forEach(h=>{h.update(); h.draw();});
    requestAnimationFrame(animateBG);
}
animateBG();

// ==================== MOUSE/GYRO ====================
if(isMobile && window.DeviceOrientationEvent) {
    window.addEventListener("deviceorientation", e=>{
        mouse.x = bgCanvas.width/2 + e.gamma*10;
        mouse.y = bgCanvas.height/2 + e.beta*10;
    });
} else {
    window.addEventListener("mousemove", e=>{
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
}

// ==================== YES BUTTON ====================
const yesBtn = document.getElementById("yesBtn");
const popup = document.getElementById("popup");
const contentWrapper = document.getElementById("contentWrapper");

yesBtn.onclick = () => {
    contentWrapper.classList.add("blur");
    popup.classList.add("show");
    setTimeout(()=>{
        popup.classList.remove("show");
        contentWrapper.classList.remove("blur");
    },3000);
};

// ==================== NO BUTTON (PLAYFUL ESCAPE WITHIN BOUND) ====================
const noBtn = document.getElementById("noBtn");

function moveNoButton() {
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;
    const yesBtnWidth = yesBtn.offsetWidth;

    // allowed range so it doesn't overlap yes button
    const containerWidth = document.querySelector(".buttons").offsetWidth;
    const minX = yesBtnWidth + 20; // minimum distance from yes button
    const maxX = containerWidth - btnWidth;
    const maxY = 0;

    // move NO button slightly within its allowed range
    const left = minX + Math.random()*(maxX - minX);
    const top = maxY + Math.random()*10; // small vertical wiggle

    noBtn.style.transform = `translate(${left}px, ${top}px) scale(${1 + Math.random()*0.1}) rotate(${Math.random()*10-5}deg)`;
}

noBtn.addEventListener("mouseenter", moveNoButton);
noBtn.addEventListener("touchstart", moveNoButton); // mobile

// ==================== RESIZE ====================
window.addEventListener("resize",()=>{
    bgCanvas.width = window.innerWidth;
    bgCanvas.height = window.innerHeight;
});
</script>
</body>
</html>
