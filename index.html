<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Just One Question ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #ffccd5;
        }

        body {
            margin: 0;
            height: 100vh;
            background: radial-gradient(circle, #fff0f3 0%, #ffccd5 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            touch-action: none; 
        }

        .container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 300px;
            box-shadow: 0 20px 60px rgba(255, 77, 109, 0.2);
            z-index: 10;
            border: 2px solid #ffffff;
        }

        h1 { color: var(--primary-pink); margin: 0 0 10px 0; font-size: 26px; }
        p { color: #594d5b; line-height: 1.5; margin-bottom: 20px; }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 80px;
        }

        button {
            padding: 14px 30px;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #yesBtn {
            background: var(--primary-pink);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3);
            z-index: 5;
        }

        #noBtn {
            background: #fff;
            color: var(--primary-pink);
            border: 2px solid var(--soft-pink);
            z-index: 100;
            white-space: nowrap;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 80px rgba(255, 77, 109, 0.3);
            border: 3px solid var(--primary-pink);
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container" id="mainBox">
    <h1>Hey Sonali... ❤️</h1>
    <p>Will you be mine forever?</p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup">
        <h2 style="color: var(--primary-pink); font-size: 2.5rem; margin: 0;">YAY! 💖</h2>
        <h3 style="color: #444;">Saurabh ❤️ Sonali</h3>
        <p>I choose you today and every day after this...❤️</p>
    </div>
</div>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let hearts = [];
    let mouse = { x: -1000, y: -1000 };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    class Heart {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 22 + 10;
            this.speedX = (Math.random() - 0.5) * 1.2;
            this.speedY = (Math.random() - 0.5) * 1.2;
            this.opacity = Math.random() * 0.4 + 0.2;
        }
        update() {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 250) {
                this.x += dx * 0.01;
                this.y += dy * 0.01;
            }
            this.x += this.speedX;
            this.y += this.speedY;

            if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
            if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
        }
        draw() {
            ctx.globalAlpha = this.opacity;
            ctx.font = `${this.size}px Arial`;
            ctx.fillText("❤️", this.x, this.y);
        }
    }

    for (let i = 0; i < 60; i++) hearts.push(new Heart());

    // --- Cursor & Gyro Sensors ---
    const isMobile = /Mobi|Android/i.test(navigator.userAgent);
    if(!isMobile) {
        window.addEventListener("mousemove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    } else if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', (e) => {
            mouse.x = (canvas.width/2) + (e.gamma * 10);
            mouse.y = (canvas.height/2) + (e.beta * 10);
        });
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        hearts.forEach(h => { h.update(); h.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // --- Button Logic ---
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const overlay = document.getElementById("overlay");
    let yesScale = 1;

    const moveNo = (e) => {
        if (e) e.preventDefault();
        
        // Mathematical Safe Boundaries
        const btnWidth = noBtn.offsetWidth;
        const btnHeight = noBtn.offsetHeight;
        const margin = 20; // Ensure it doesn't touch the absolute edge

        const maxX = window.innerWidth - btnWidth - margin;
        const maxY = window.innerHeight - btnHeight - margin;

        // Ensure random values are within screen bounds
        const randomX = Math.max(margin, Math.random() * maxX);
        const randomY = Math.max(margin, Math.random() * maxY);

        noBtn.style.position = "fixed";
        noBtn.style.left = `${randomX}px`;
        noBtn.style.top = `${randomY}px`;
        noBtn.style.margin = "0";

        // "Yes" button grows
        yesScale += 0.15;
        yesBtn.style.transform = `scale(${yesScale})`;
    };

    noBtn.addEventListener("mouseover", moveNo);
    noBtn.addEventListener("touchstart", moveNo);

    yesBtn.onclick = () => {
        overlay.style.display = "flex";
        
        // Success Burst
        hearts.forEach(h => { h.speedX *= 8; h.speedY *= 8; h.opacity = 0.8; });

        // Popup stays only for 3 seconds
        setTimeout(() => {
            overlay.style.display = "none";
        }, 3000);
    };
</script>

</body>
</html>
