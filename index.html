<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>
<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 10;
    position: relative;
}

.buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    position: relative;
    transition: transform 0.2s;
}

#yesBtn {
    background: #28a745;
    color: white;
}

#noBtn {
    background: #dc3545;
    color: white;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(8px) brightness(1.1);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    animation: pop 0.3s ease;
    max-width: 80%;
}

@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}

.typing span {
    border-right: 2px solid #000;
    padding-right: 2px;
    white-space: nowrap;
}
</style>
</head>
<body>

<div class="container">
    <h1 class="typing" id="typing"></h1>
    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup">
        <h2>💖 Saurabh ❤️ Sonali 💖</h2>
        <p>I want to grow old with you, laugh with you, and love you endlessly.<br>Will you be mine? 💖</p>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
// ---------- TYPING EFFECT ----------
const message = "Hey Sonali...❤️";
const typingEl = document.getElementById("typing");
let idx = 0;
function typeText() {
    if(idx < message.length){
        typingEl.innerHTML += message[idx];
        idx++;
        setTimeout(typeText, 150);
    }
}
typeText();

// ---------- CANVAS HEARTS ----------
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];
let mouse = { x: canvas.width/2, y: canvas.height/2 };
let isMobile = /Mobi|Android/i.test(navigator.userAgent);

class Heart {
    constructor() {
        this.x = Math.random()*canvas.width;
        this.y = Math.random()*canvas.height;
        this.size = Math.random()*15 + 10;
        this.dx = (Math.random()-0.5)*2;
        this.dy = (Math.random()-0.5)*2;
    }
    draw() {
        ctx.font = this.size + "px Arial";
        ctx.fillText("❤️", this.x, this.y);
    }
    update() {
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;

        if(!isMobile){
            this.x += dx*0.002 + this.dx;
            this.y += dy*0.002 + this.dy;
        } else {
            this.x += this.dx;
            this.y += this.dy;
        }

        // keep inside screen
        if(this.x < 0) this.x = 0;
        if(this.x > canvas.width) this.x = canvas.width;
        if(this.y < 0) this.y = 0;
        if(this.y > canvas.height) this.y = canvas.height;
    }
}

for(let i=0;i<100;i++){
    hearts.push(new Heart());
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    hearts.forEach(h=>{
        h.update();
        h.draw();
    });
    requestAnimationFrame(animate);
}
animate();

window.addEventListener("mousemove",(e)=>{
    if(!isMobile){
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    }
});

if(window.DeviceOrientationEvent){
    window.addEventListener("deviceorientation", function(event){
        if(isMobile){
            mouse.x = canvas.width/2 + event.gamma*20;
            mouse.y = canvas.height/2 + event.beta*20;
        }
    });
}

// ---------- YES BUTTON ----------
const yesBtn = document.getElementById("yesBtn");
const overlay = document.getElementById("overlay");
yesBtn.addEventListener("click", ()=>{
    overlay.style.display = "flex";
    setTimeout(()=>{ overlay.style.display = "none"; }, 3000);
});

// ---------- NO BUTTON ----------
const noBtn = document.getElementById("noBtn");
let noMoved = false;

noBtn.addEventListener("mouseenter", ()=>{
    if(!noMoved){
        noMoved = true;
        setInterval(moveNoButton, 700); // jumps every 0.7 sec
    }
});

function moveNoButton(){
    const btnWidth = noBtn.offsetWidth;
    const btnHeight = noBtn.offsetHeight;

    const scale = 1 + Math.random()*0.1; 
    const rotation = Math.random()*15 - 7.5;

    const maxX = window.innerWidth - btnWidth*scale - 10;
    const maxY = window.innerHeight - btnHeight*scale - 10;

    const left = Math.random() * maxX;
    const top = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = left + "px";
    noBtn.style.top = top + "px";
    noBtn.style.transform = `rotate(${rotation}deg) scale(${scale})`;
}

// ---------- RESIZE ----------
window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
