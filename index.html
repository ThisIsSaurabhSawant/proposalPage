<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 10;
}

.buttons {
    position: relative;
    height: 80px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    position: absolute;
}

#yesBtn {
    background: #28a745;
    color: white;
    left: 20px;
    top: 20px;
}

#noBtn {
    background: #dc3545;
    color: white;
    left: 180px;
    top: 20px;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(255,182,193,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup {
    background: white;
    padding: 30px;
    border-radius: 20px;
    animation: pop 0.3s ease;
}

@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>
</head>

<body>

<div class="container">
    <h1>Hey Sonali.....❤️</h1>
    <p>Will you be mine? 💖</p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup">
        <h2>💖 Yayyyy! 💖</h2>
        <p>You made my world ❤️</p>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];

class Heart {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = 18 + Math.random() * 10;
        this.dx = (Math.random() - 0.5) * 4;
        this.dy = (Math.random() - 0.5) * 4;
    }

    draw() {
        ctx.font = this.size + "px Arial";
        ctx.fillText("❤️", this.x, this.y);
    }

    update() {
        this.x += this.dx;
        this.y += this.dy;

        // 💥 Wall collision (blast effect)
        if (this.x <= 0 || this.x >= canvas.width) {
            this.dx *= -1;
            createMiniBlast(this.x, this.y);
        }

        if (this.y <= 0 || this.y >= canvas.height) {
            this.dy *= -1;
            createMiniBlast(this.x, this.y);
        }
    }
}

// 💥 mini blast on wall hit
function createMiniBlast(x, y) {
    for (let i = 0; i < 5; i++) {
        hearts.push(new Heart(x, y));
    }
}

// 💥 collision detection
function resolveCollision(h1, h2) {
    const dx = h1.x - h2.x;
    const dy = h1.y - h2.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 20) {
        // bounce
        h1.dx *= -1;
        h1.dy *= -1;
        h2.dx *= -1;
        h2.dy *= -1;

        // 💖 duplicate (limit count)
        if (hearts.length < 120) {
            hearts.push(new Heart(h1.x, h1.y));
        }
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < hearts.length; i++) {
        hearts[i].update();
        hearts[i].draw();

        for (let j = i + 1; j < hearts.length; j++) {
            resolveCollision(hearts[i], hearts[j]);
        }
    }

    requestAnimationFrame(animate);
}

animate();

// ✅ NO button moves FULL SCREEN (but inside viewport)
document.getElementById("noBtn").onmouseover = function () {
    this.style.position = "fixed";

    const maxX = window.innerWidth - this.offsetWidth;
    const maxY = window.innerHeight - this.offsetHeight;

    this.style.left = Math.random() * maxX + "px";
    this.style.top = Math.random() * maxY + "px";
};

// ✅ YES CLICK
document.getElementById("yesBtn").onclick = () => {

    document.getElementById("overlay").style.display = "flex";

    // 💥 initial blast
    for (let i = 0; i < 40; i++) {
        hearts.push(new Heart(
            Math.random() * canvas.width,
            Math.random() * canvas.height
        ));
    }

    setTimeout(() => {
        document.getElementById("overlay").style.display = "none";
    }, 3000);
};

</script>

</body>
</html>
