<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 10;
}

.buttons {
    position: relative;
    height: 80px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    position: absolute;
}

#yesBtn {
    background: #28a745;
    color: white;
    left: 20px;
    top: 20px;
}

#noBtn {
    background: #dc3545;
    color: white;
    left: 180px;
    top: 20px;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(255,182,193,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup {
    background: white;
    padding: 30px;
    border-radius: 20px;
    animation: pop 0.3s ease;
}

@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>
</head>

<body>

<div class="container">
    <h1>Hey Sonali...❤️</h1>
    <p>Will you be mine? 💖</p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup">
        <h2>💖 Yayyyy! 💖</h2>
        <p>You made my world ❤️</p>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];
let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

// 💖 HEART CLASS
class Heart {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 20 + 10;
        this.dx = (Math.random() - 0.5) * 2;
        this.dy = (Math.random() - 0.5) * 2;
    }

    draw() {
        ctx.font = this.size + "px Arial";
        ctx.fillText("❤️", this.x, this.y);
    }

    update() {
    // 🧲 stronger attraction
    let dx = mouse.x - this.x;
    let dy = mouse.y - this.y;

    const attraction = 0.01;   // 🔥 increase this for faster pull
    const friction = 0.98;     // smooth movement

    this.dx += dx * attraction;
    this.dy += dy * attraction;

    this.dx *= friction;
    this.dy *= friction;

    this.x += this.dx;
    this.y += this.dy;

    // bounce edges
    if (this.x <= 0 || this.x >= canvas.width) this.dx *= -1;
    if (this.y <= 0 || this.y >= canvas.height) this.dy *= -1;
}
}

// 💖 CREATE MANY HEARTS
for (let i = 0; i < 320; i++) {
    hearts.push(new Heart());
}

// 🎯 MOUSE TRACK
window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// 🎬 ANIMATION LOOP
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    hearts.forEach(h => {
        h.update();
        h.draw();
    });

    requestAnimationFrame(animate);
}

animate();

// 😈 NO BUTTON FULL SCREEN ESCAPE
document.getElementById("noBtn").onmouseover = function () {
    this.style.position = "fixed";

    const maxX = window.innerWidth - this.offsetWidth;
    const maxY = window.innerHeight - this.offsetHeight;

    this.style.left = Math.random() * maxX + "px";
    this.style.top = Math.random() * maxY + "px";
};

// 💖 YES CLICK
document.getElementById("yesBtn").onclick = () => {
    const overlay = document.getElementById("overlay");

    overlay.style.display = "flex";

    setTimeout(() => {
        overlay.style.display = "none";
    }, 3000);
};
</script>

</body>
</html>
