<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 10;
}

.buttons {
    position: relative;
    height: 80px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    position: absolute;
}

#yesBtn {
    background: #28a745;
    color: white;
    left: 20px;
    top: 20px;
}

#noBtn {
    background: #dc3545;
    color: white;
    left: 180px;
    top: 20px;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>
</head>

<body>

<div class="container">
    <h1 id="title"></h1>
    <p id="line1"></p>
    <p id="line2"></p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
// 🎬 TYPEWRITER
function typeWriter(element, text, speed = 40) {
    let i = 0;
    function typing() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

typeWriter(document.getElementById("title"), "Hey Sonali...❤️");
setTimeout(() => typeWriter(document.getElementById("line1"), "I want to grow old with you..."), 800);
setTimeout(() => typeWriter(document.getElementById("line2"), "Will you be mine? 💖"), 2000);

// 🎮 SMART NO BUTTON
let escapeLevel = 0;
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    escapeLevel++;

    if (escapeLevel === 1) {
        moveBtn(100);
    } else if (escapeLevel === 2) {
        moveBtn(200);
    } else if (escapeLevel === 3) {
        noBtn.style.transform = "scale(0.7)";
        moveBtn(300);
    } else if (escapeLevel === 4) {
        noBtn.innerText = "Are you sure? 😏";
        moveBtn(400);
    } else {
        noBtn.style.display = "none";
    }
});

function moveBtn(range) {
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;

    noBtn.style.position = "fixed";
    noBtn.style.left = Math.random() * maxX + "px";
    noBtn.style.top = Math.random() * maxY + "px";
}

// 💖 HEART BACKGROUND
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class Heart {
    constructor() {
        this.size = Math.random() * 20 + 10;
        this.x = Math.random() * (canvas.width - this.size * 2) + this.size;
        this.y = Math.random() * (canvas.height - this.size * 2) + this.size;
        this.dx = (Math.random() - 0.5) * 2;
        this.dy = (Math.random() - 0.5) * 2;
    }

    draw() {
        ctx.font = this.size + "px Arial";
        ctx.fillText("❤️", this.x, this.y);
    }

    update() {
        this.x += this.dx;
        this.y += this.dy;

        const p = this.size;

        if (this.x < p || this.x > canvas.width - p) this.dx *= -1;
        if (this.y < p || this.y > canvas.height - p) this.dy *= -1;
    }
}

let hearts = [];
for (let i = 0; i < 100; i++) hearts.push(new Heart());

// 🎉 CONFETTI / EXPLOSION
let particles = [];

function explode() {
    for (let i = 0; i < 150; i++) {
        particles.push({
            x: canvas.width / 2,
            y: canvas.height / 2,
            dx: (Math.random() - 0.5) * 10,
            dy: (Math.random() - 0.5) * 10,
            life: 100
        });
    }
}

function drawParticles() {
    particles.forEach((p, i) => {
        ctx.fillText("💖", p.x, p.y);
        p.x += p.dx;
        p.y += p.dy;
        p.life--;

        if (p.life <= 0) particles.splice(i, 1);
    });
}

// 💖 YES CLICK
document.getElementById("yesBtn").onclick = () => {
    explode();

    // vibration
    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
};

// 🎬 ANIMATION
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    hearts.forEach(h => {
        h.update();
        h.draw();
    });

    drawParticles();

    requestAnimationFrame(animate);
}

animate();

// 📱 RESIZE
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
