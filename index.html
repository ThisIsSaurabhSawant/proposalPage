<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>
<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 10;
}

.buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
}

#yesBtn {
    background: #28a745;
    color: white;
}

#noBtn {
    background: #dc3545;
    color: white;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(255,182,193,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup {
    background: white;
    padding: 30px;
    border-radius: 20px;
    animation: pop 0.3s ease;
    text-align: center;
}

@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>
</head>
<body>

<div class="container" id="mainBox">
    <h1 id="titleText">Hey Sonali...❤️</h1>
    <p>I want to grow old with you, laugh with you, and love you endlessly.</p>
    <p>Will you be mine? 💖</p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup">
        <h2>💖 Wow! 💖</h2>
        <p id="finalText">I choose you today and every day after this...❤️</p>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let hearts = [];
let mouse = { x: canvas.width/2, y: canvas.height/2 };
let isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
let gyroX = 0, gyroY = 0;

// HEART CLASS
class Heart {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 20 + 10;
        this.dx = (Math.random()-0.5) * 2;
        this.dy = (Math.random()-0.5) * 2;
    }
    draw() {
        ctx.font = this.size + "px Arial";
        ctx.fillText("❤️", this.x, this.y);
    }
    update() {
        if(isMobile){
            this.x += this.dx + gyroX*5;
            this.y += this.dy + gyroY*5;
        } else {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            this.x += dx*0.002 + this.dx;
            this.y += dy*0.002 + this.dy;
        }

        // CLAMP inside screen
        if(this.x < 0){ this.x=0; this.dx *= -1; }
        if(this.x > canvas.width){ this.x=canvas.width; this.dx *= -1; }
        if(this.y < 0){ this.y=0; this.dy *= -1; }
        if(this.y > canvas.height){ this.y=canvas.height; this.dy *= -1; }
    }
}

// CREATE HEARTS
for(let i=0;i<120;i++) hearts.push(new Heart());

// MOUSE TRACK
if(!isMobile){
    window.addEventListener("mousemove", e=>{
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
}

// GYRO TRACK
if(isMobile){
    window.addEventListener('deviceorientation', e=>{
        gyroX = e.gamma/45;
        gyroY = e.beta/45;
    });
}

// ANIMATION LOOP
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    hearts.forEach(h=>{h.update(); h.draw();});
    requestAnimationFrame(animate);
}
animate();

// NO BUTTON PLAYFUL
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", ()=>{
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;
    noBtn.style.position = "fixed";
    noBtn.style.left = Math.random()*maxX + "px";
    noBtn.style.top = Math.random()*maxY + "px";
});

// YES BUTTON
const yesBtn = document.getElementById("yesBtn");
let clickCount = 0;
yesBtn.onclick = ()=>{
    const overlay = document.getElementById("overlay");
    const finalEl = document.getElementById("finalText");
    const titleEl = document.getElementById("titleText");

    clickCount++;
    titleEl.innerHTML = "Saurabh ❤️ Sonali ".repeat(clickCount);

    // SHOW POPUP
    overlay.style.display = "flex";
    setTimeout(()=>{ overlay.style.display = "none"; }, 3000);

    // CONFETTI BURST
    for(let i=0;i<100;i++){
        hearts.push(new Heart());
    }
};

// RESIZE
window.addEventListener("resize", ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
