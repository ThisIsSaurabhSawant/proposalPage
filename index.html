<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
    overflow: hidden;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.buttons {
    position: relative;
    height: 80px;
    margin-top: 20px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    position: absolute;
    transition: all 0.2s ease;
}

#yesBtn {
    background: #28a745;
    color: white;
    left: 20px;
    top: 20px;
}

#noBtn {
    background: #dc3545;
    color: white;
    left: 180px;
    top: 20px;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(255,182,193,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.popup {
    background: white;
    padding: 30px;
    border-radius: 20px;
    animation: pop 0.3s ease;
}

@keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

/* 💥 Blast animation */
@keyframes flyUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-110vh); opacity: 0; }
}

/* 💫 Floating chaos hearts */
@keyframes floatMove {
    0% { transform: translate(0,0); }
    25% { transform: translate(40px,-60px); }
    50% { transform: translate(-30px,40px); }
    75% { transform: translate(60px,30px); }
    100% { transform: translate(0,0); }
}

.heart {
    position: fixed;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="container">
    <h1>Hey Sonali ❤️</h1>
    <p>Will you be mine? 💖</p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup">
        <h2>💖 Yayyyy! 💖</h2>
        <p>You made my world ❤️</p>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const overlay = document.getElementById("overlay");

    // ✅ NO BUTTON (stays inside box)
    noBtn.addEventListener("mouseenter", () => {
        const container = document.querySelector(".buttons");

        const maxX = container.clientWidth - noBtn.offsetWidth;
        const maxY = container.clientHeight - noBtn.offsetHeight;

        const x = Math.random() * maxX;
        const y = Math.random() * maxY;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    // ✅ YES CLICK
    yesBtn.addEventListener("click", () => {

        overlay.style.display = "flex";

        createBlast();

        setTimeout(() => {
            overlay.style.display = "none";
            startChaos();
        }, 3000);
    });

    // 💥 BIG SMOOTH BLAST (NO LAG)
    function createBlast() {
        const hearts = ["❤️","💖","💘","💕","💞"];

        for (let i = 0; i < 150; i++) {
            let el = document.createElement("div");
            el.className = "heart";
            el.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

            let x = Math.random() * window.innerWidth;

            el.style.left = x + "px";
            el.style.bottom = "-20px";
            el.style.fontSize = (Math.random() * 25 + 12) + "px";

            let duration = Math.random() * 2 + 2;

            el.style.animation = `flyUp ${duration}s linear forwards`;

            document.body.appendChild(el);

            setTimeout(() => el.remove(), duration * 1000);
        }
    }

    // 💥 CHAOS HEARTS (SMOOTH FLOATING)
    function startChaos() {
        const hearts = ["❤️","💖","💘","💕","💞"];

        for (let i = 0; i < 40; i++) {
            let el = document.createElement("div");
            el.className = "heart";
            el.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];

            el.style.left = Math.random() * window.innerWidth + "px";
            el.style.top = Math.random() * window.innerHeight + "px";
            el.style.fontSize = "20px";

            let duration = Math.random() * 6 + 4;

            el.style.animation = `floatMove ${duration}s infinite ease-in-out`;

            document.body.appendChild(el);
        }
    }

});
</script>

</body>
</html>
