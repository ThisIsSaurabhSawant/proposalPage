<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just One Question ❤️</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none; /* Prevents scrolling on mobile while chasing the button */
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            color: #d63384;
            margin-bottom: 10px;
        }

        p {
            color: #444;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            min-height: 100px; /* Space for growing button */
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #yesBtn {
            background: #ff4757;
            color: white;
            z-index: 11;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            background: #ff6b81;
        }

        #noBtn {
            background: #f1f2f6;
            color: #57606f;
            position: relative;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 182, 193, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">
    <h1>Hey Sonali...❤️</h1>
    <p>I want to grow old with you, laugh with you, and love you endlessly.</p>
    <p><b>Will you be mine? 💖</b></p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup">
        <h2 style="font-size: 3rem; margin: 0;">🎉 ✨ 💖</h2>
        <h2 style="color: #ff4757;">Saurabh ❤️ Sonali</h2>
        <p style="font-size: 1.2rem;">I choose you today and every day after this...❤️</p>
    </div>
</div>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    let hearts = [];
    const heartEmojis = ["❤️", "💖", "💝", "💕", "🌸", "✨"];

    // Set Canvas Size
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    // Heart Particle Class
    class Heart {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + 50;
            this.size = Math.random() * 15 + 10;
            this.speed = Math.random() * 1.5 + 0.5;
            this.opacity = Math.random() * 0.6 + 0.4;
            this.emoji = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            this.swing = Math.random() * 2;
            this.swingSpeed = Math.random() * 0.02;
        }
        update() {
            this.y -= this.speed;
            this.x += Math.sin(this.y * this.swingSpeed) * this.swing;
            if (this.y < -50) this.reset();
        }
        draw() {
            ctx.globalAlpha = this.opacity;
            ctx.font = `${this.size}px Arial`;
            ctx.fillText(this.emoji, this.x, this.y);
        }
    }

    // Initialize hearts
    for (let i = 0; i < 40; i++) hearts.push(new Heart());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        hearts.forEach(h => {
            h.update();
            h.draw();
        });
        requestAnimationFrame(animate);
    }
    animate();

    // Logic for Buttons
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    let currentYesSize = 18;
    let paddingVertical = 12;
    let paddingHorizontal = 25;

    const escape = () => {
        // Move the "No" button randomly
        const maxX = window.innerWidth - noBtn.offsetWidth - 20;
        const maxY = window.innerHeight - noBtn.offsetHeight - 20;
        
        const randomX = Math.max(10, Math.random() * maxX);
        const randomY = Math.max(10, Math.random() * maxY);
        
        noBtn.style.position = "fixed";
        noBtn.style.left = `${randomX}px`;
        noBtn.style.top = `${randomY}px`;

        // Make the "Yes" button grow bigger!
        currentYesSize += 8;
        paddingVertical += 4;
        paddingHorizontal += 8;
        
        yesBtn.style.fontSize = `${currentYesSize}px`;
        yesBtn.style.padding = `${paddingVertical}px ${paddingHorizontal}px`;
        
        // Optional: Change No button text
        const noTexts = ["Are you sure?", "Really?", "Think again!", "Pwease? 🥺", "Don't do this!", "You're breaking my heart!"];
        noBtn.innerText = noTexts[Math.floor(Math.random() * noTexts.length)];
    };

    noBtn.addEventListener("mouseover", escape);
    noBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        escape();
    });

    yesBtn.onclick = () => {
        document.getElementById("overlay").style.display = "flex";
        
        // Explosion effect: Add 100 fast-moving hearts
        for(let i=0; i<100; i++) {
            const burstHeart = new Heart();
            burstHeart.y = window.innerHeight / 2;
            burstHeart.x = window.innerWidth / 2;
            burstHeart.speed = (Math.random() - 0.5) * 15;
            burstHeart.swing = (Math.random() - 0.5) * 15;
            hearts.push(burstHeart);
        }
    };
</script>

</body>
</html>
