<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Just One Question ❤️</title>
<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    z-index: 10;
}

.buttons {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
}

#yesBtn {
    background: #28a745;
    color: white;
}

#noBtn {
    background: #dc3545;
    color: white;
}

#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    pointer-events: none;
}

.popup {
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.3s ease;
}

.popup.show {
    opacity: 1;
    transform: scale(1);
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}
</style>
</head>
<body>

<div class="container">
    <h1>Hey Sonali...❤️</h1>
    <p>I want to grow old with you, laugh with you, and love you endlessly.</p>
    <p>Will you be mine? 💖</p>

    <div class="buttons">
        <button id="yesBtn">Yes ❤️</button>
        <button id="noBtn">No 😅</button>
    </div>
</div>

<div id="overlay">
    <div class="popup" id="popup">
        <h2>💖 Saurabh ❤️ Sonali 💖</h2>
        <p id="popupText"></p>
    </div>
</div>

<canvas id="bgCanvas"></canvas>
<canvas id="effectCanvas"></canvas>

<script>
const bgCanvas = document.getElementById("bgCanvas");
const bgCtx = bgCanvas.getContext("2d");
bgCanvas.width = window.innerWidth;
bgCanvas.height = window.innerHeight;

const effectCanvas = document.getElementById("effectCanvas");
const effectCtx = effectCanvas.getContext("2d");
effectCanvas.width = window.innerWidth;
effectCanvas.height = window.innerHeight;

let mouse = {x: bgCanvas.width/2, y: bgCanvas.height/2};
let isMobile = /Mobi|Android/i.test(navigator.userAgent);

// ==================== BACKGROUND HEARTS ====================
class Heart {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * bgCanvas.width;
        this.y = Math.random() * bgCanvas.height;
        this.size = Math.random() * 20 + 10;
        this.dx = (Math.random()-0.5) * 1.5;
        this.dy = (Math.random()-0.5) * 1.5;
    }
    update() {
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        this.x += dx * 0.002 + this.dx;
        this.y += dy * 0.002 + this.dy;

        // stay inside screen
        if(this.x < 0) this.x = 0;
        if(this.x > bgCanvas.width) this.x = bgCanvas.width;
        if(this.y < 0) this.y = 0;
        if(this.y > bgCanvas.height) this.y = bgCanvas.height;
    }
    draw() {
        bgCtx.font = this.size + "px Arial";
        bgCtx.fillText("❤️", this.x, this.y);
    }
}

let hearts = [];
for(let i=0;i<100;i++) hearts.push(new Heart());

function animateBG() {
    bgCtx.clearRect(0,0,bgCanvas.width,bgCanvas.height);
    hearts.forEach(h=>{h.update(); h.draw();});
    requestAnimationFrame(animateBG);
}
animateBG();

// ==================== MOUSE/GYRO ====================
if(isMobile && window.DeviceOrientationEvent) {
    window.addEventListener("deviceorientation", e=>{
        // gamma left/right - tilt
        let gx = e.gamma; // -90 to 90
        let gy = e.beta; // -180 to 180
        mouse.x = bgCanvas.width/2 + gx*10;
        mouse.y = bgCanvas.height/2 + gy*10;
    });
} else {
    window.addEventListener("mousemove", e=>{
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });
}

// ==================== EFFECTS ====================
class Particle {
    constructor(x,y,char,color){
        this.x = x;
        this.y = y;
        this.vx = (Math.random()-0.5)*6;
        this.vy = (Math.random()-0.5)*6;
        this.alpha = 1;
        this.char = char || "❤️";
        this.color = color || "red";
        this.size = Math.random()*20+10;
    }
    update(){
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.05; // gravity
        this.alpha -= 0.02;
    }
    draw(ctx){
        ctx.globalAlpha = this.alpha;
        ctx.font = this.size+"px Arial";
        ctx.fillStyle = this.color;
        ctx.fillText(this.char,this.x,this.y);
        ctx.globalAlpha = 1;
    }
}

let particles = [];

function animateEffect() {
    effectCtx.clearRect(0,0,effectCanvas.width,effectCanvas.height);
    for(let i=particles.length-1;i>=0;i--){
        particles[i].update();
        particles[i].draw(effectCtx);
        if(particles[i].alpha <=0) particles.splice(i,1);
    }
    requestAnimationFrame(animateEffect);
}
animateEffect();

// ==================== YES BUTTON ====================
const yesBtn = document.getElementById("yesBtn");
const popup = document.getElementById("popup");
const popupText = document.getElementById("popupText");

yesBtn.onclick = () => {
    // Add explosion particles
    let rect = yesBtn.getBoundingClientRect();
    for(let i=0;i<40;i++){
        particles.push(new Particle(rect.left+rect.width/2, rect.top+rect.height/2, "❤️", ["#ff6b81","#ff4757","#ff7f50"][Math.floor(Math.random()*3)]));
    }
    for(let i=0;i<40;i++){
        particles.push(new Particle(rect.left+rect.width/2, rect.top+rect.height/2, "🎉", ["#ffd700","#00ffea","#ff69b4"][Math.floor(Math.random()*3)]));
    }

    // Typewriter popup
    popupText.innerHTML = "";
    let message = "I choose you today and every day after this...❤️";
    popup.classList.add("show");
    let i=0;
    let typeInterval = setInterval(()=>{
        popupText.innerHTML += message[i];
        i++;
        if(i>=message.length) clearInterval(typeInterval);
    },50);

    // Hide after 3 seconds
    setTimeout(()=>{
        popup.classList.remove("show");
        popupText.innerHTML = "";
    },3000);
};

// ==================== NO BUTTON ====================
const noBtn = document.getElementById("noBtn");
noBtn.onmouseover = function(){
    const maxX = window.innerWidth - noBtn.offsetWidth;
    const maxY = window.innerHeight - noBtn.offsetHeight;
    this.style.position = "fixed";
    this.style.left = Math.random()*maxX + "px";
    this.style.top = Math.random()*maxY + "px";
};

// ==================== RESIZE ====================
window.addEventListener("resize",()=>{
    bgCanvas.width = window.innerWidth;
    bgCanvas.height = window.innerHeight;
    effectCanvas.width = window.innerWidth;
    effectCanvas.height = window.innerHeight;
});
</script>

</body>
</html>
